name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
          - goos: darwin
            goarch: amd64
            os: macos-latest
          - goos: darwin
            goarch: arm64
            os: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="parts-finder-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/$STAGE"
          export CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/$STAGE/parts-finder" .
          cp README.md LICENSE "dist/$STAGE/" 2>/dev/null || true
          cd dist
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/parts-finder-*.tar.gz*
          retention-days: 7

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist/
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  bump-tap:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skip prereleases — only stable tags update the tap formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Read sha256 files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p sha
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*.sha256' \
            --dir sha
          extract() {
            awk '{print $1}' "sha/parts-finder-${VERSION}-$1.tar.gz.sha256"
          }
          {
            echo "VERSION=${VERSION}"
            echo "SHA_DARWIN_ARM64=$(extract darwin-arm64)"
            echo "SHA_DARWIN_AMD64=$(extract darwin-amd64)"
            echo "SHA_LINUX_ARM64=$(extract linux-arm64)"
            echo "SHA_LINUX_AMD64=$(extract linux-amd64)"
          } >> "$GITHUB_ENV"

      - name: Check out homebrew tap
        uses: actions/checkout@v7
        with:
          repository: stubbedev/homebrew-parts-finder
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate formula
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cat > tap/Formula/parts-finder.rb <<EOF
          class PartsFinder < Formula
            desc "MCP server for speccing servers from compatible hardware and finding deals"
            homepage "https://github.com/stubbedev/parts-finder-mcp"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/stubbedev/parts-finder-mcp/releases/download/v#{version}/parts-finder-#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/stubbedev/parts-finder-mcp/releases/download/v#{version}/parts-finder-#{version}-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/stubbedev/parts-finder-mcp/releases/download/v#{version}/parts-finder-#{version}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/stubbedev/parts-finder-mcp/releases/download/v#{version}/parts-finder-#{version}-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "parts-finder"
            end

            def caveats
              <<~CAVEATS
                Register with Claude Code:
                  claude mcp add parts-finder -- #{opt_bin}/parts-finder
              CAVEATS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/parts-finder --version")
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/parts-finder.rb 2>/dev/null && [ -f Formula/parts-finder.rb ]; then
            echo "Formula already up to date for ${VERSION}; nothing to do."
            exit 0
          fi
          git add Formula/parts-finder.rb
          git commit -m "parts-finder ${VERSION}"
          git push
